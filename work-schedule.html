<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FSG 근무일정표</title>
<style>

  :root{
    --navy:#003087;
    --navy-deep:#001C55;
    --blue:#009EE0;
    --blue-soft:#E4F5FC;
    --paper:#F6F8FB;
    --ink:#16233F;
    --ink-soft:#5A6B8C;
    --line:#DFE6F2;
    --white:#FFFFFF;

    --t-west:#009EE0;
    --t-east:#E8871E;
    --t-central:#7A5CC4;
    --t-south:#1FA85C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  .app{max-width:1320px;margin:0 auto;padding:28px 20px 60px;}

  .header{
    background:linear-gradient(120deg,var(--navy) 0%, var(--navy-deep) 100%);
    border-radius:14px;padding:14px 22px;color:white;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
    box-shadow:0 6px 18px -10px rgba(0,48,135,0.4);
  }
  .header .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:2px;}
  .header h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-0.01em;}
  .header p{margin:2px 0 0;color:#C9D8F5;font-size:11.5px;}
  .header-stats{display:flex;gap:16px;}
  .stat{text-align:right;}
  .stat .num{font-size:17px;font-weight:800;color:white;}
  .stat .lbl{font-size:10px;color:#AFC3EF;}

  /* team tabs */
  .team-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:18px;}
  .team-tab{
    min-width:0;background:white;border:1.5px solid var(--line);border-radius:12px;
    padding:10px 14px;cursor:pointer;transition:.15s;text-align:left;
  }
  .team-tab .tt-name{font-size:13.5px;font-weight:800;color:var(--ink);}
  .team-tab .tt-count{font-size:10.5px;color:var(--ink-soft);margin-top:1px;}
  .team-tab.active{border-color:var(--tc);box-shadow:0 0 0 2px var(--tc) inset;}
  .team-tab.active .tt-name{color:var(--tc);}
  .team-tab:hover{border-color:var(--tc);}

  .night-band{
    margin-top:10px;background:white;border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;font-size:12.5px;color:var(--ink);line-height:1.6;
  }
  .night-band-label{font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .night-band-sep{color:var(--ink-soft);margin:0 6px;}
  .night-band-empty{color:var(--ink-soft);}

  .controls{display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:14px;}
  .nav-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .month-nav{display:flex;align-items:center;gap:14px;background:white;border:1px solid var(--line);
    border-radius:12px;padding:8px 10px;box-shadow:0 2px 8px rgba(20,40,90,0.04);}
  .month-nav button{
    width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--paper);
    color:var(--navy);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .month-nav button:hover{background:var(--blue-soft);border-color:var(--blue);}
  .month-nav .label{font-size:15.5px;font-weight:800;color:var(--navy);min-width:150px;text-align:center;}
  .month-nav .today-btn{
    margin-left:2px;font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-soft);
    border:1px solid var(--blue);border-radius:8px;padding:6px 10px;cursor:pointer;width:auto;height:auto;
  }
  .view-toggle{display:flex;background:white;border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;}
  .view-toggle button{
    border:none;background:transparent;color:var(--ink-soft);font-size:12.5px;font-weight:700;
    padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .view-toggle button.active{background:var(--navy);color:white;}

  .right-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .add-btn{
    display:flex;align-items:center;gap:6px;background:white;color:var(--navy);border:1.5px solid var(--line);
    border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .add-btn:hover{background:var(--blue-soft);border-color:var(--blue);}
  .add-btn.active{background:var(--navy);color:white;border-color:var(--navy);}

  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;align-items:center;}
  .legend .chip{
    display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:5px 10px;border-radius:20px;background:white;border:1px solid var(--line);color:var(--ink-soft);
    cursor:pointer;transition:.15s;
  }
  .legend .chip:hover{border-color:var(--blue);}
  .legend .chip .dot{width:8px;height:8px;border-radius:50%;}
  .legend .chip-clear{background:var(--paper);color:var(--ink-soft);font-weight:700;}

  .cal-card{
    background:white;border:1px solid var(--line);border-radius:16px;margin-top:16px;
    box-shadow:0 6px 24px -14px rgba(20,40,90,0.15);overflow:hidden;
  }
  .grid-scroll{overflow-x:auto;overflow-y:hidden;max-width:100%;-webkit-overflow-scrolling:touch;}
  .scroll-hint{display:none;text-align:center;font-size:11.5px;font-weight:600;color:var(--ink-soft);padding:8px 0 2px;background:white;}
  button{touch-action:manipulation;}
  table.sched td.daycell, table.weeksched td.wcell{touch-action:manipulation;}
  table.sched, table.weeksched{border-collapse:collapse;table-layout:auto;}
  table.sched th, table.sched td, table.weeksched th, table.weeksched td{border:1px solid var(--line);}
  table.sched thead th{
    background:var(--navy);color:#CFE0FF;font-size:11px;font-weight:700;padding:8px 6px;text-align:center;
    position:sticky;top:0;z-index:5;white-space:nowrap;
  }
  table.sched thead th.namecol{position:sticky;left:0;z-index:8;background:var(--navy-deep);min-width:118px;text-align:left;padding-left:12px;}
  table.sched thead th.sun{color:#FFB4B4;}
  table.sched thead th.sat{color:#AFD8FF;}
  table.sched thead th.holi{background:#7A1E1E;}
  table.sched thead th .wk{display:block;font-size:9.5px;font-weight:600;opacity:.85;}

  table.sched td.namecell{
    position:sticky;left:0;background:white;z-index:3;min-width:118px;padding:6px 12px;white-space:nowrap;
  }
  table.sched td.namecell .nm{font-size:12.5px;font-weight:800;color:var(--ink);white-space:nowrap;}
  table.sched td.namecell .rl{font-size:10px;color:var(--ink-soft);margin-left:4px;white-space:nowrap;}

  table.sched td.daycell{
    min-width:40px;height:42px;padding:2px;cursor:pointer;position:relative;transition:.1s;text-align:center;vertical-align:middle;
  }
  table.sched td.daycell:hover{outline:2px solid var(--blue);outline-offset:-2px;}
  table.sched td.daycell.weekend-col{background:#DCE7FB;}
  table.sched td.daycell.holiday-col{background:#FAD8D8;}
  table.sched td.daycell.today{background:var(--blue-soft);}
  table.sched td.daycell.cell-dim{opacity:.15;}
  .quad{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;height:100%;}
  .qcell{font-size:7px;font-weight:800;border-radius:2px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .duty-chips{display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;height:100%;padding:2px;}
  .duty-chip{font-size:8px;font-weight:800;border-radius:3px;padding:1px 4px;min-width:22px;text-align:center;line-height:1.4;}
  .duty-chips .duty-empty{color:#C6CEDD;font-size:11px;}
  .qcell.q-empty{background:transparent;}
  .qcell.q-text{font-size:9px;}
  .night-badge{
    position:absolute;top:2px;right:2px;min-width:14px;height:14px;padding:0 3px;border-radius:4px;
    font-size:8px;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;line-height:1;
  }

  /* week view */
  table.weeksched thead th{
    background:var(--navy);color:#CFE0FF;font-size:11.5px;font-weight:700;padding:9px 8px;text-align:center;
    position:sticky;top:0;z-index:5;white-space:nowrap;
  }
  table.weeksched thead th.datecol{position:sticky;left:0;z-index:9;background:var(--navy-deep);width:76px;min-width:76px;max-width:76px;}
  table.weeksched thead th.labelcol{position:sticky;left:76px;z-index:8;background:var(--navy-deep);width:84px;min-width:84px;max-width:84px;}
  table.weeksched td.datecell{
    position:sticky;left:0;background:var(--paper);z-index:4;width:76px;min-width:76px;max-width:76px;
    padding:6px 6px;font-size:12px;font-weight:800;color:var(--navy);text-align:center;vertical-align:middle;white-space:normal;line-height:1.2;
  }
  table.weeksched td.labelcell{
    position:sticky;left:76px;background:var(--paper);z-index:3;width:84px;min-width:84px;max-width:84px;padding:6px 10px;font-size:11px;font-weight:700;color:var(--ink-soft);white-space:nowrap;
  }
  table.weeksched td.datecell .dlabel{font-size:12px;font-weight:800;color:var(--navy);display:block;}
  table.weeksched tr.daygroup-start td{border-top:2px solid var(--navy);}
  table.weeksched tr.weekend-row td.datecell{background:#DCE7FB;}
  table.weeksched tr.weekend-row td.labelcell{background:#DCE7FB;}
  table.weeksched tr.weekend-row td.wcell{background:#DCE7FB;}
  table.weeksched tr.holiday-row td.datecell{background:#FAD8D8;}
  table.weeksched tr.holiday-row td.labelcell{background:#FAD8D8;}
  table.weeksched tr.holiday-row td.wcell{background:#FAD8D8;}
  table.weeksched tr.today-row td.datecell{background:var(--blue-soft);}
  table.weeksched tr.today-row td.labelcell{background:var(--blue-soft);}
  table.weeksched tr.today-row td.wcell{background:var(--blue-soft);}
  table.weeksched td.wcell{
    min-width:78px;min-height:30px;padding:4px 6px;cursor:pointer;text-align:center;vertical-align:middle;transition:.1s;
    font-size:11px;color:var(--ink);word-break:break-word;
  }
  table.weeksched td.wcell:hover{outline:2px solid var(--blue);outline-offset:-2px;}
  table.weeksched td.wcell.empty{color:#C6CEDD;}
  table.weeksched td.wcell.wcell-dim{opacity:.15;}
  .wbadge{display:inline-block;font-size:10px;font-weight:800;border-radius:5px;padding:2px 6px;margin:1px;}

  .overlay{position:fixed;inset:0;background:rgba(10,20,45,0.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay.show{display:flex;}
  .panel{
    background:white;border-radius:16px;max-width:440px;width:100%;max-height:88vh;overflow:auto;
    padding:22px 24px;box-shadow:0 24px 60px -20px rgba(0,20,60,0.5);
  }
  .panel h3{margin:0 0 2px;color:var(--navy);font-size:17px;}
  .panel .sub{color:var(--ink-soft);font-size:12px;margin-bottom:16px;}
  .panel .close{float:right;border:none;background:var(--paper);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--ink-soft);}

  .form-row{margin-bottom:12px;}
  .form-row label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
  .form-row input[type=text], .form-row select{
    width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;
    font-family:inherit;color:var(--ink);background:white;
  }
  .form-row input:focus, .form-row select:focus{outline:none;border-color:var(--blue);}
  .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field-hint{font-size:11px;color:var(--ink-soft);margin:-4px 0 12px;line-height:1.5;}
  .combo{position:relative;}
  .combo-input{padding-right:32px !important;}
  .combo-toggle{
    position:absolute;right:4px;top:50%;transform:translateY(-50%);width:26px;height:26px;
    border:none;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:11px;
    display:flex;align-items:center;justify-content:center;border-radius:6px;
  }
  .combo-toggle:hover{background:var(--paper);color:var(--blue);}
  .combo-list{
    position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1.5px solid var(--line);
    border-radius:8px;box-shadow:0 10px 24px -10px rgba(20,40,90,0.3);z-index:20;max-height:220px;overflow-y:auto;display:none;
  }
  .combo-list.show{display:block;}
  .combo-item{padding:9px 12px;font-size:13px;cursor:pointer;color:var(--ink);}
  .combo-item:hover{background:var(--blue-soft);}
  .combo-item .ci-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  .form-actions{display:flex;gap:8px;margin-top:16px;}
  .form-actions button{flex:1;padding:11px;border-radius:9px;border:none;font-size:13.5px;font-weight:700;cursor:pointer;}
  .btn-save{background:var(--navy);color:white;}
  .btn-save:hover{background:var(--navy-deep);}
  .btn-cancel{background:var(--paper);color:var(--ink-soft);border:1.5px solid var(--line) !important;}
  .btn-clear{background:#FCE6E6;color:#A21E1E;border:1.5px solid #F5C2C2 !important;}

  .save-toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;
    padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 10px 30px -10px rgba(0,0,0,0.4);
    z-index:60;opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .save-toast.show{opacity:1;}

  footer{margin-top:22px;text-align:center;color:var(--ink-soft);font-size:11.5px;}

  .guide{
    background:white;border:1px solid var(--line);border-radius:18px;margin-top:20px;
    padding:24px 26px 22px;box-shadow:0 6px 24px -14px rgba(20,40,90,0.1);
  }
  .guide-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .guide-title::before{content:"";width:4px;height:16px;background:var(--blue);border-radius:2px;}
  .guide-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .guide-item{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px 15px;}
  .guide-icon{font-size:18px;margin-bottom:6px;}
  .guide-h{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:5px;}
  .guide-d{font-size:11.8px;line-height:1.55;color:var(--ink-soft);}
  @media(max-width:820px){.guide-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:520px){.guide-grid{grid-template-columns:1fr;}}

  @media(max-width:900px){
    .app{padding:16px 12px 40px;}
    .header{padding:12px 16px;}
    .right-controls{width:100%;}
  }
  @media(max-width:600px){
    .app{padding:6px 6px 24px;}
    .header{padding:8px 12px;border-radius:12px;}
    .header .eyebrow{font-size:8.5px;margin-bottom:0;}
    .header h1{font-size:15px;}
    .header p[style]{display:none;}
    .header-stats{gap:10px;width:100%;justify-content:space-between;margin-top:4px;}
    .team-tabs{margin-top:8px;gap:6px;grid-template-columns:repeat(3,1fr);}
    .night-band{margin-top:6px;font-size:11.5px;padding:6px 10px;line-height:1.4;}
    .controls{margin-top:8px;gap:6px;}
    .month-nav{width:100%;justify-content:space-between;padding:5px 8px;}
    .month-nav .label{font-size:13px;min-width:auto;}
    .month-nav button{width:32px;height:32px;font-size:16px;}
    .view-toggle{width:100%;justify-content:center;padding:3px;}
    .view-toggle button{flex:1;padding:7px 12px;font-size:13px;}
    .right-controls .add-btn{font-size:12px;padding:7px 10px;flex:1 1 44%;justify-content:center;}
    .team-tab{min-width:0;padding:7px 10px;}
    .team-tab .tt-name{font-size:13px;}
    .team-tab .tt-count{font-size:9.5px;}
    .legend{margin-top:8px;gap:5px;}
    .legend .chip{font-size:11px;padding:4px 9px;}
    .cal-card{margin-top:8px;}
    .scroll-hint{padding:5px 0 1px;font-size:10.5px;}
    .panel{padding:18px 16px;border-radius:14px;}
    .form-row input[type=text], .form-row select{font-size:16px;padding:12px 10px;}
    .form-grid2{grid-template-columns:1fr 1fr;}
    .guide{padding:18px 16px;margin-top:12px;}

    .scroll-hint{display:block;}

    /* 월간 뷰: 칸 크기 및 글자 확대 */
    table.sched thead th{font-size:11.5px;padding:10px 5px;}
    table.sched thead th .wk{font-size:10px;}
    table.sched td.namecell{min-width:92px;padding:9px 10px;}
    table.sched td.namecell .nm{font-size:13px;}
    table.sched td.namecell .rl{font-size:10.5px;}
    table.sched td.daycell{min-width:48px;height:50px;}
    .qcell{font-size:9.5px;}
    .duty-chip{font-size:9.5px;padding:2px 5px;min-width:26px;}
    .night-badge{min-width:17px;height:17px;font-size:9.5px;}

    /* 주간 뷰: 칸 크기 및 글자 확대, 위아래 폭은 압축 */
    table.weeksched thead th{font-size:12.5px;padding:7px 8px;}
    table.weeksched thead th.datecol{width:50px;min-width:50px;max-width:50px;font-size:10px;padding:7px 3px;white-space:normal;line-height:1.1;}
    table.weeksched thead th.labelcol{left:50px;width:44px;min-width:44px;max-width:44px;font-size:9.5px;padding:7px 3px;white-space:normal;line-height:1.1;}
    table.weeksched td.datecell{width:50px;min-width:50px;max-width:50px;padding:3px 3px;font-size:10.5px;font-weight:800;color:var(--navy);white-space:normal;line-height:1.1;}
    table.weeksched td.labelcell{left:50px;width:44px;min-width:44px;max-width:44px;padding:3px 3px;font-size:9px;white-space:normal;line-height:1.1;}
    table.weeksched td.datecell .dlabel{font-size:11px;font-weight:800;color:var(--navy);white-space:normal;line-height:1.05;}
    table.weeksched td.wcell{font-size:13px;padding:4px 8px;min-height:24px;min-width:86px;}
    .wbadge{font-size:11.5px;padding:2px 6px;}
  }

  .app-nav{display:flex;gap:8px;margin-bottom:14px;}
  .app-nav a{
    flex:0 0 auto;padding:8px 16px;border-radius:10px;font-size:12.5px;font-weight:700;
    text-decoration:none;border:1.5px solid var(--line);color:var(--ink-soft);background:white;transition:.15s;
  }
  .app-nav a:hover{border-color:var(--blue);color:var(--blue);}
  .app-nav a.active{background:var(--navy);color:white;border-color:var(--navy);}
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<body>
<div class="app">
  <div class="app-nav">
    <a href="index.html">🏥 설치일정</a>
    <a href="work-schedule.html" class="active">📅 근무일정</a>
  </div>

  <div class="header">
    <div>
      <div class="eyebrow">Sysmex Korea · FS Group</div>
      <h1>FSG 근무일정표</h1>
      <p style="margin-top:6px;font-size:10px;color:#8FA6D9;">만든이: FSS Team Jun</p>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </div>

  <div class="team-tabs" id="teamTabs"></div>
  <div class="night-band" id="nightBanner"></div>

  <div class="controls">
    <div class="nav-wrap">
      <div class="month-nav">
        <button id="prevBtn">‹</button>
        <div class="label" id="navLabel"></div>
        <button id="nextBtn">›</button>
        <button class="today-btn" id="todayBtn">오늘</button>
      </div>
      <div class="view-toggle">
        <button id="viewMonthBtn">월간</button>
        <button id="viewWeekBtn" class="active">주간</button>
      </div>
    </div>
    <div class="right-controls">

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg || '저장되었습니다';
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 1700);
}

// ============================================================
// Firebase 연동 (postMessage 클론 오류를 피하기 위해 AbortController 대신
// Promise.race 기반 타임아웃을 사용합니다)
// ============================================================
function fetchWithTimeout(url, options, timeoutMs){
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject)=> setTimeout(()=>reject(new Error('TIMEOUT')), timeoutMs))
  ]);
}

async function loadStorage(){
  if(!STORAGE_ENDPOINT) return;
  try{
    const res = await fetchWithTimeout(STORAGE_ENDPOINT, {cache:'no-store'}, 8000);
    if(!res.ok){
      console.error('loadStorage HTTP error', res.status, res.statusText);
      if(res.status===401 || res.status===403) showToast('⚠ 접근 거부됨 — Firebase 데이터베이스 규칙을 확인해주세요');
      return;
    }
    const data = await res.json();
    if(data){
      TEAM_ORDER.forEach(tk=>{ scheduleData[tk] = data[tk] || {}; });
    }
  }catch(err){
    console.error('loadStorage network error', err);
    showToast(err.message==='TIMEOUT' ? '⚠ 서버 응답이 없습니다 (네트워크가 느리거나 차단됨)' : '⚠ 서버에 연결할 수 없습니다 (네트워크/방화벽 확인)');
  }
}

// 예전 당직1·당직2·당직3 값을 단일 "당직"으로 통일 (매 접속시 확인, 변경 있을 때만 저장)
function normalizeWeekendKeys(){
  let changed = false;
  TEAM_ORDER.forEach(tk=>{
    Object.keys(scheduleData[tk]||{}).forEach(dstr=>{
      Object.keys(scheduleData[tk][dstr]).forEach(nm=>{
        const e = scheduleData[tk][dstr][nm];
        if(e.weekend === '당직1' || e.weekend === '당직2' || e.weekend === '당직3'){
          e.weekend = '당직';
          changed = true;
        }
      });
    });
  });
  return changed;
}

// 주말·공휴일에 남아있는 석/야간(석간)·석간(철야) 값을 당직으로 통일
// 주말·공휴일에는 야간 필드를 쓰지 않고 주말/휴일 구분(당직)으로 통일합니다.
function normalizeWeekendNight(){
  let changed = false;
  TEAM_ORDER.forEach(tk=>{
    Object.keys(scheduleData[tk]||{}).forEach(dstr=>{
      const isOff = isWeekendDate(dstr) || !!HOLIDAYS_KR[dstr];
      if(!isOff) return;
      Object.keys(scheduleData[tk][dstr]).forEach(nm=>{
        const e = scheduleData[tk][dstr][nm];
        if(e.night === '석간' || e.night === '철야' || e.night === '당직'){
          if(!e.weekend) e.weekend = '당직';
          e.night = '';
          changed = true;
        }
      });
    });
  });
  return changed;
}

function fmtDate(y,m,d){ return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }
function weekdayKr(y,m,d){ return ['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()]; }
function todayISO(){ const t=new Date(); return fmtDate(t.getFullYear(), t.getMonth()+1, t.getDate()); }
function isWeekendDate(dstr){ const d=new Date(dstr+'T00:00:00').getDay(); return d===0||d===6; }
function addDaysStr(dstr, n){ const d=new Date(dstr+'T00:00:00'); d.setDate(d.getDate()+n); return fmtDate(d.getFullYear(), d.getMonth()+1, d.getDate()); }
function getMonday(dstr){ const d=new Date(dstr+'T00:00:00'); const day=d.getDay(); const diff = day===0 ? -6 : 1-day; d.setDate(d.getDate()+diff); return fmtDate(d.getFullYear(), d.getMonth()+1, d.getDate()); }
function nextWorkday(dstr){
  let nd = addDaysStr(dstr, 1);
  while(isWeekendDate(nd) || HOLIDAYS_KR[nd]){ nd = addDaysStr(nd, 1); }
  return nd;
}
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }

function getEntry(team, date, name){
  return (scheduleData[team] && scheduleData[team][date] && scheduleData[team][date][name]) || {};
}
function memberTeam(m){ return m.team || currentTeam; }
function setEntry(team, date, name, entry){
  if(!scheduleData[team][date]) scheduleData[team][date] = {};
  const isEmpty = !entry.night && !entry.weekend && !entry.am1 && !entry.am2 && !entry.pm1 && !entry.pm2;
  if(isEmpty){
    delete scheduleData[team][date][name];
    if(Object.keys(scheduleData[team][date]).length===0) delete scheduleData[team][date];
  } else {
    scheduleData[team][date][name] = entry;
  }
}

function slotMatchesFilter(val){
  if(!activeFilter) return true;
  const st = matchStatus(val);
  return !!(st && st.key === activeFilter);
}
function nightMatchesFilter(nightVal){
  if(!activeFilter) return true;
  return nightVal === activeFilter;
}
function entryMatchesFilter(entry){
  if(!activeFilter) return true;
  if(NIGHT_MAP[activeFilter]) return entry.night === activeFilter;
  return SLOT_KEYS.some(k=>{ const st = matchStatus(entry[k]); return st && st.key===activeFilter; });
}

function renderNightBanner(){
  const el = document.getElementById('nightBanner');
  const team = TEAMS[currentTeam];
  const t = todayISO();
  const todayIsOffDay = isWeekendDate(t) || !!HOLIDAYS_KR[t];

  function tag(m){ return currentTeam==='all' ? (' [' + TEAMS[memberTeam(m)].label.replace('FS ','') + ']') : ''; }

  // 1) 오늘 야간
  const nightGroups = {};
  NIGHT_STATUS.filter(s=>s.key).forEach(s=> nightGroups[s.key] = []);
  team.members.forEach(m=>{
    const e = getEntry(memberTeam(m), t, m.name);
    if(e.night && nightGroups[e.night]) nightGroups[e.night].push(m.name + tag(m));
  });
  const nightParts = NIGHT_STATUS.filter(s=>s.key).map(s=> nightGroups[s.key].length ? (s.label + ': ' + nightGroups[s.key].join(', ')) : null).filter(Boolean);

  // 2) 오늘 휴가자
  const leaveNames = [];
  team.members.forEach(m=>{
    const e = getEntry(memberTeam(m), t, m.name);
    const isLeave = SLOT_KEYS.some(k=>{
      const st = matchStatus(e[k]);
      return st && (st.key==='휴가' || st.key==='오전휴가' || st.key==='오후휴가');
    });
    if(isLeave) leaveNames.push(m.name + tag(m));
  });

  let html =
    '<div><span class="night-band-label">오늘 야간</span><span class="night-band-sep">—</span>' +
      (nightParts.length ? nightParts.join(', ') : '<span class="night-band-empty">없음</span>') + '</div>' +
    '<div style="margin-top:4px;"><span class="night-band-label">오늘 휴가자</span><span class="night-band-sep">—</span>' +
      (leaveNames.length ? leaveNames.join(', ') : '<span class="night-band-empty">없음</span>') + '</div>';

  // 3) 오늘 주말·공휴일 당직자 — 팀 구분 없이 전체 팀에서 항상 표시 (오늘이 주말·공휴일일 때만)
  if(todayIsOffDay){
    const dutyGroups = {};
    WEEKEND_STATUS.filter(s=>s.key).forEach(s=> dutyGroups[s.label] = []);
    TEAMS.all.members.forEach(m=>{
      const e = getEntry(m.team, t, m.name);
      if(e.weekend && WEEKEND_MAP[e.weekend]){
        dutyGroups[WEEKEND_MAP[e.weekend].label].push(m.name + '(' + TEAMS[m.team].label + ')');
      }
    });
    const dutyParts = WEEKEND_STATUS.filter(s=>s.key).map(s=> dutyGroups[s.label].length ? (s.label + ': ' + dutyGroups[s.label].join(', ')) : null).filter(Boolean);
    html += '<div style="margin-top:4px;"><span class="night-band-label">오늘 주말·공휴일 당직 (전체 팀)</span><span class="night-band-sep">—</span>' +
      (dutyParts.length ? dutyParts.join(', ') : '<span class="night-band-empty">없음</span>') + '</div>';
  }

  el.innerHTML = html;
}

function fillDayCell(td, entry){

      div.className = 'qcell';
      div.style.color = st.color;
      div.style.background = st.bg;
      div.textContent = st.short;
    } else if(val){
      div.className = 'qcell q-text';
      div.style.color = '#8C4E0C';
      div.style.background = '#FDEEDC';
      div.textContent = '·';
    } else {
      div.className = 'qcell q-empty';
    }
    if(val) titleParts.push(SLOT_LABELS[slot] + ': ' + val);
    quad.appendChild(div);
  });
  td.appendChild(quad);

  if(entry.night && NIGHT_MAP[entry.night]){
    const st = NIGHT_MAP[entry.night];
    const badge = document.createElement('span');
    badge.className = 'night-badge';
    badge.style.background = st.color;
    badge.textContent = st.short;
    td.appendChild(badge);
    titleParts.push('야간: ' + st.label);
  }
  if(entry.weekend && WEEKEND_MAP[entry.weekend]){
    const st = WEEKEND_MAP[entry.weekend];
    td.style.borderLeft = '3px solid ' + st.color;
    const badge = document.createElement('span');
    badge.className = 'night-badge';
    badge.style.background = st.color;
    badge.textContent = st.short;
    td.appendChild(badge);
    titleParts.push('주말/휴일 구분: ' + st.label);
  }
  if(titleParts.length) td.title = titleParts.join('\n');
  if(!entryMatchesFilter(entry)) td.classList.add('cell-dim');
}

  wrap.className = 'duty-chips';
  const titleParts = [];

  if(entry.night && NIGHT_MAP[entry.night]){
    const st = NIGHT_MAP[entry.night];
    const chip = document.createElement('div');
    chip.className = 'duty-chip';
    chip.style.color = st.color; chip.style.background = st.bg;
    chip.textContent = st.short;
    wrap.appendChild(chip);
    titleParts.push('야간: ' + st.label);
  }
  if(entry.weekend && WEEKEND_MAP[entry.weekend]){
    const st = WEEKEND_MAP[entry.weekend];
    const chip = document.createElement('div');
    chip.className = 'duty-chip';
    chip.style.color = st.color; chip.style.background = st.bg;
    chip.textContent = st.short;
    wrap.appendChild(chip);
    titleParts.push('주말/휴일 구분: ' + st.label);
  }
  if(!wrap.children.length){
    const dash = document.createElement('div');
    dash.className = 'duty-empty';
    dash.textContent = '·';
    wrap.appendChild(dash);
  }
  td.appendChild(wrap);
  if(titleParts.length) td.title = titleParts.join('\n');
  if(!entryMatchesFilter(entry)) td.classList.add('cell-dim');
}

function renderMonthGrid(){
  const container = document.getElementById('gridScroll');
  container.innerHTML = '';
  const team = TEAMS[currentTeam];

  const todayStr = todayISO();

  const table = document.createElement('table');

  const thead = document.createElement('thead');

  for(let d=1; d<=nDays; d++){

    const wk = weekdayKr(viewYear, viewMonth, d);
    const holi = HOLIDAYS_KR[dstr];
    const th = document.createElement('th');
    th.className = (wk==='일'?'sun ':'') + (wk==='토'?'sat ':'') + (holi?'holi':'');
    th.title = holi || '';
    th.innerHTML = d + '<span class="wk">' + wk + '</span>';
    trh.appendChild(th);
  }
  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  team.members.forEach(m=>{
    const tr = document.createElement('tr');
    const mTeam = memberTeam(m);
    const nameTd = document.createElement('td');
    nameTd.className = 'namecell';
    const teamTag = currentTeam==='all' ? (' · ' + TEAMS[mTeam].label.replace('FS ','')) : '';
    nameTd.innerHTML = '<span class="nm">' + m.name + '</span><span class="rl">' + m.role + teamTag + '</span>';
    tr.appendChild(nameTd);

    for(let d=1; d<=nDays; d++){
      const dstr = fmtDate(viewYear, viewMonth, d);
      const wk = weekdayKr(viewYear, viewMonth, d);
      const weekend = (wk==='일'||wk==='토');
      const holi = HOLIDAYS_KR[dstr];
      const entry = Object.assign(blankEntry(), getEntry(mTeam, dstr, m.name));
      const td = document.createElement('td');
      td.className = 'daycell' + (dstr===todayStr?' today':'') + (holi?' holiday-col':(weekend?' weekend-col':''));

      td.onclick = ()=>openEditor(mTeam, dstr, m.name);

    }
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);
}

function renderWeekGrid(){
  const container = document.getElementById('gridScroll');
  container.innerHTML = '';
  const team = TEAMS[currentTeam];
  const monday = getMonday(weekAnchor);
  const weekDates = Array.from({length:7}, (_,i)=>addDaysStr(monday, i));
  const todayStr = todayISO();

  const table = document.createElement('table');
  table.className = 'weeksched';

  const thead = document.createElement('thead');
  const trh = document.createElement('tr');
  trh.innerHTML = '<th class="datecol">날짜</th><th class="labelcol">구분</th>';
  team.members.forEach(m=>{
    const th = document.createElement('th');
    const teamTag = currentTeam==='all' ? (' · ' + TEAMS[memberTeam(m)].label.replace('FS ','')) : '';
    th.innerHTML = m.name + '<span style="display:block;font-size:9.5px;font-weight:600;opacity:.85;">' + m.role + teamTag + '</span>';
    trh.appendChild(th);
  });
  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  function addRow(dstr, rowLabel, cellFn, opts){
    opts = opts || {};
    const tr = document.createElement('tr');
    if(opts.groupStart) tr.classList.add('daygroup-start');
    if(dstr===todayStr) tr.classList.add('today-row');
    if(HOLIDAYS_KR[dstr]) tr.classList.add('holiday-row');
    else if(isWeekendDate(dstr)) tr.classList.add('weekend-row');
    if(opts.dateLabel){
      const dateTd = document.createElement('td');
      dateTd.className = 'datecell';
      if(opts.rowSpan && opts.rowSpan > 1) dateTd.rowSpan = opts.rowSpan;
      dateTd.innerHTML = '<span class="dlabel">' + opts.dateLabel + '</span>';
      tr.appendChild(dateTd);
    }
    const labelTd = document.createElement('td');
    labelTd.className = 'labelcell';
    labelTd.innerHTML = rowLabel;
    tr.appendChild(labelTd);
    team.members.forEach(m=>{
      const td = document.createElement('td');
      td.className = 'wcell';
      cellFn(td, m);
      td.onclick = ()=>openEditor(memberTeam(m), dstr, m.name);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

  function slotCell(td, mTeam, dstr, name, slot){
    const e = getEntry(mTeam, dstr, name);
    const val = e[slot];
    const st = matchStatus(val);
    if(st){
      td.innerHTML = '<span class="wbadge" style="color:' + st.color + ';background:' + st.bg + '">' + val + '</span>';
    } else if(val){
      td.textContent = val;
    } else {
      td.classList.add('empty'); td.textContent='';
    }
    if(!slotMatchesFilter(val)) td.classList.add('wcell-dim');
  }
  function badgeHtml(map, key){
    const st = key ? map[key] : null;
    return st ? ('<span class="wbadge" style="color:' + st.color + ';background:' + st.bg + '">' + st.label + '</span>') : null;
  }

  weekDates.forEach(dstr=>{
    const parts = dstr.split('-').map(Number);
    const y=parts[0], mo=parts[1], da=parts[2];
    const wk = weekdayKr(y,mo,da);
    const dateLabel = mo + '/' + da + ' (' + wk + ')';
    const holi = HOLIDAYS_KR[dstr];

    if(!isWeekendDate(dstr) && !holi){
      if(!dutyOnlyView){
        addRow(dstr, SLOT_LABELS.am1,
          (td,m)=>slotCell(td, memberTeam(m), dstr, m.name, 'am1'), {groupStart:true, dateLabel, rowSpan:5});
        addRow(dstr, SLOT_LABELS.am2, (td,m)=>slotCell(td, memberTeam(m), dstr, m.name, 'am2'));
        addRow(dstr, SLOT_LABELS.pm1, (td,m)=>slotCell(td, memberTeam(m), dstr, m.name, 'pm1'));
        addRow(dstr, SLOT_LABELS.pm2, (td,m)=>slotCell(td, memberTeam(m), dstr, m.name, 'pm2'));
        addRow(dstr, '야간', (td,m)=>{
          const e = getEntry(memberTeam(m),dstr,m.name);
          const html = badgeHtml(NIGHT_MAP, e.night);
          if(html){
            td.innerHTML = html;
          } else { td.classList.add('empty'); td.textContent='-'; }
          if(!nightMatchesFilter(e.night)) td.classList.add('wcell-dim');
        });
      } else {
        addRow(dstr, '야간', (td,m)=>{
          const e = getEntry(memberTeam(m),dstr,m.name);
          const html = badgeHtml(NIGHT_MAP, e.night);
          if(html){
            td.innerHTML = html;
          } else { td.classList.add('empty'); td.textContent='-'; }
          if(!nightMatchesFilter(e.night)) td.classList.add('wcell-dim');
        }, {groupStart:true, dateLabel, rowSpan:1});
      }
    } else {
      const rowLabel = holi ? ('휴일 <span style="color:#A21E1E;">· ' + holi + '</span>') : '주말 · 구분';
      addRow(dstr, rowLabel, (td,m)=>{
        const e = getEntry(memberTeam(m),dstr,m.name);
        let html = badgeHtml(WEEKEND_MAP, e.weekend);
        if(!html){
          const parts2 = SLOT_KEYS.map(k=>{
            const st = matchStatus(e[k]);
            if(st) return '<span class="wbadge" style="color:' + st.color + ';background:' + st.bg + '">' + e[k] + '</span>';
            return e[k] ? ('<span class="wbadge" style="background:var(--paper);color:var(--ink-soft);">'+e[k]+'</span>') : '';
          }).filter(Boolean);
          const nightBadge = badgeHtml(NIGHT_MAP, e.night);
          if(nightBadge) parts2.push(nightBadge);
          if(parts2.length) html = parts2.join(' ');
        }
        if(html) td.innerHTML = html; else { td.classList.add('empty'); td.textContent='-'; }
        const matches = !activeFilter || e.weekend===activeFilter || entryMatchesFilter(e);
        if(!matches) td.classList.add('wcell-dim');
      }, {groupStart:true, dateLabel, rowSpan:1});
    }
  });

  table.appendChild(tbody);
  container.appendChild(table);
}

// 편집 패널
// ============================================================
function openEditor(team, date, name){
  const panel = document.getElementById('panel');
  const entry = Object.assign(blankEntry(), getEntry(team,date,name));
  const parts = date.split('-').map(Number);
  const y=parts[0], m=parts[1], d=parts[2];
  const wk = weekdayKr(y,m,d);
  const weekend = isWeekendDate(date);
  const isOffDay = weekend || !!HOLIDAYS_KR[date];
  const member = TEAMS[team].members.find(mm=>mm.name===name);

  function slotInput(id, val){
    return '<div class="combo" id="wrap-' + id + '">' +
      '<input type="text" id="' + id + '" class="combo-input" value="' + (val||'').replace(/"/g,'&quot;') + '" placeholder="" autocomplete="off">' +
      '<button type="button" class="combo-toggle" tabindex="-1">▾</button>' +
      '<div class="combo-list"></div>' +
    '</div>';
  }

  const nightOptions = NIGHT_STATUS.filter(s=> !s.key || s.weekdayOnly || s.key === entry.night);

  panel.innerHTML =
    '<button class="close" onclick="closePanel()">✕</button>' +
    '<h3>' + name + ' <span style="font-size:12px;color:var(--ink-soft);font-weight:600;">' + (member?member.role:'') + '</span></h3>' +
    '<div class="sub">' + y + '년 ' + m + '월 ' + d + '일 (' + wk + ') · ' + TEAMS[team].label + '</div>' +

    '<div id="ampmRows" style="' + (isOffDay?'display:none;':'') + '">' +
      '<div class="form-row form-grid2">' +
        '<div><label>오전1</label>' + slotInput('f-am1', entry.am1) + '</div>' +
        '<div><label>오전2</label>' + slotInput('f-am2', entry.am2) + '</div>' +
      '</div>' +
      '<div class="form-row form-grid2">' +
        '<div><label>오후1</label>' + slotInput('f-pm1', entry.pm1) + '</div>' +
        '<div><label>오후2</label>' + slotInput('f-pm2', entry.pm2) + '</div>' +
      '</div>' +
    '</div>' +

    '<div class="form-row" id="nightRow" style="' + (isOffDay?'display:none;':'') + '">' +
      '<label>야간</label>' +
      '<select id="f-night">' + nightOptions.map(s=>'<option value="' + s.key + '" ' + (entry.night===s.key?'selected':'') + '>' + s.label + '</option>').join('') + '</select>' +
    '</div>' +

    '<div class="form-row" id="weekendRow" style="' + (isOffDay?'':'display:none;') + '">' +
      '<label>주말/휴일 구분</label><select id="f-weekend">' + WEEKEND_STATUS.map(s=>'<option value="' + s.key + '" ' + (entry.weekend===s.key?'selected':'') + '>' + s.label + '</option>').join('') + '</select>' +
    '</div>' +

    '<div class="form-actions">' +
      '<button class="btn-clear" id="f-clear">비우기</button>' +
      '<button class="btn-cancel" id="f-cancel">취소</button>' +
      '<button class="btn-save" id="f-save">저장</button>' +
    '</div>';

  const slotIds = ['f-am1','f-am2','f-pm1','f-pm2'];

  function applyCascade(triggerId, val){
    const st = HALF_MAP[val];
    if(!st || !st.fillGroup) return;
    let targets;
    if(st.fillGroup === 'all') targets = slotIds;
    else if(st.fillGroup === 'am') targets = ['f-am1','f-am2'];
    else targets = ['f-pm1','f-pm2'];
    targets.forEach(oid=>{ panel.querySelector('#'+oid).value = val; });
  }

  function renderComboList(listEl, filterText){
    const q = (filterText||'').trim().toLowerCase();
    let statusItems = HALF_STATUS.filter(s=>s.key);
    if(!isOffDay) statusItems = statusItems.filter(s=> s.key !== '당직'); // 당직은 주말·공휴일에만 선택 가능
    const instItems = q ? INSTITUTION_LIST.filter(n=> n.toLowerCase().includes(q)).slice(0,8) : [];
    let html = '';
    const matchedStatus = q ? statusItems.filter(s=> s.label.toLowerCase().includes(q) || s.key.toLowerCase().includes(q)) : statusItems;
    matchedStatus.forEach(s=>{
      html += '<div class="combo-item" data-val="' + s.key + '"><span class="ci-dot" style="background:' + s.color + '"></span>' + s.label + '</div>';
    });
    if(instItems.length){
      instItems.forEach(n=>{
        html += '<div class="combo-item" data-val="' + n.replace(/"/g,'&quot;') + '"><span class="ci-dot" style="background:#C6CEDD"></span>' + n + '</div>';
      });
    }
    if(!html) html = '<div class="combo-item" style="color:var(--ink-soft);cursor:default;">일치하는 항목 없음</div>';
    listEl.innerHTML = html;
  }

  function closeAllCombos(){
    panel.querySelectorAll('.combo-list.show').forEach(l=>l.classList.remove('show'));
  }

  slotIds.forEach(id=>{
    const wrap = panel.querySelector('#wrap-'+id);
    const input = wrap.querySelector('.combo-input');
    const toggle = wrap.querySelector('.combo-toggle');
    const list = wrap.querySelector('.combo-list');

    toggle.onclick = (e)=>{
      e.stopPropagation();
      const willOpen = !list.classList.contains('show');
      closeAllCombos();
      if(willOpen){ renderComboList(list, ''); list.classList.add('show'); }
    };
    input.addEventListener('focus', ()=>{
      closeAllCombos();
      renderComboList(list, '');
      list.classList.add('show');
    });
    input.addEventListener('input', function(){
      renderComboList(list, this.value);
      list.classList.add('show');
      applyCascade(id, this.value.trim());
    });
    list.addEventListener('mousedown', (e)=>{
      const item = e.target.closest('.combo-item');
      if(!item || item.dataset.val === undefined) return;
      e.preventDefault();
      const val = item.dataset.val;
      const st = HALF_MAP[val];
      if(st && st.hasDetail){
        input.value = val + ': ';
        list.classList.remove('show');
        input.focus();
        const len = input.value.length;
        input.setSelectionRange(len, len);
      } else {
        input.value = val;
        list.classList.remove('show');
        applyCascade(id, val);
      }
    });
  });
  panel.addEventListener('click', (e)=>{
    if(!e.target.closest('.combo')) closeAllCombos();
  });

  const nightSel = panel.querySelector('#f-night');
  if(nightSel){
    nightSel.addEventListener('change', function(){
      if(this.value === '석간' || this.value === '철야'){
        slotIds.forEach(oid=>{ panel.querySelector('#'+oid).value = 'OFF'; });
      }
    });
  }

  panel.querySelector('#f-cancel').onclick = closePanel;
  panel.querySelector('#f-clear').onclick = async ()=>{
    setEntry(team, date, name, blankEntry());
    closePanel(); render(); await saveStorage();
  };
  panel.querySelector('#f-save').onclick = async ()=>{
    function cleanSlot(v){
      v = (v||'').trim();
      const mm = v.match(/^(회의|교육):\s*$/);
      return mm ? mm[1] : v;
    }
    const updated = {
      night: panel.querySelector('#f-night').value,
      weekend: isOffDay ? panel.querySelector('#f-weekend').value : '',
      am1: isOffDay ? '' : cleanSlot(panel.querySelector('#f-am1').value),
      am2: isOffDay ? '' : cleanSlot(panel.querySelector('#f-am2').value),
      pm1: isOffDay ? '' : cleanSlot(panel.querySelector('#f-pm1').value),
      pm2: isOffDay ? '' : cleanSlot(panel.querySelector('#f-pm2').value),
    };
    setEntry(team, date, name, updated);
    const nightLabel = (updated.night && NIGHT_MAP[updated.night]) ? NIGHT_MAP[updated.night].label : '';
    if(nightLabel === '석/야간'){
      // 석간/야간 선택 시: 다음 근무일 = 석간, 그다음 근무일 = OFF (주말·공휴일은 건너뜀)
      const day1 = nextWorkday(date);
      const e1 = Object.assign(blankEntry(), getEntry(team, day1, name));
      e1.night = '철야';
      e1.am1 = e1.am2 = e1.pm1 = e1.pm2 = 'OFF';
      setEntry(team, day1, name, e1);

      const day2 = nextWorkday(day1);
      const e2 = Object.assign(blankEntry(), getEntry(team, day2, name));
      e2.am1 = e2.am2 = e2.pm1 = e2.pm2 = 'OFF';
      setEntry(team, day2, name, e2);
    } else if(nightLabel === '석간'){
      // 석간 단독 선택 시: 다음 근무일 = OFF (주말·공휴일은 건너뜀)
      const nd = nextWorkday(date);
      const otherEntry = Object.assign(blankEntry(), getEntry(team, nd, name));
      otherEntry.am1 = otherEntry.am2 = otherEntry.pm1 = otherEntry.pm2 = 'OFF';
      setEntry(team, nd, name, otherEntry);
    }
    closePanel(); render(); await saveStorage();
  };

  document.getElementById('overlay').classList.add('show');
}
function closePanel(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').onclick = (ev)=>{ if(ev.target.id==='overlay') closePanel(); };

// ============================================================
// Excel 내보내기 (현재 팀 · 현재 월) — 통계 시트 + 상세 시트
// ============================================================
async function exportExcel(){
  const wb = new ExcelJS.Workbook();
  const team = TEAMS[currentTeam];
  const nDays = daysInMonth(viewYear, viewMonth);
  const statDefs = HALF_STATUS.filter(s=>s.key);
  const nightDefs = NIGHT_STATUS.filter(s=>s.key);
  const weekendDefs = WEEKEND_STATUS.filter(s=>s.key);
  const NAVY = 'FF003087', WHITE = 'FFFFFFFF', LIGHTBLUE = 'FFE4F5FC', LINE = 'FFDFE6F2';

  function getMonthsWithData(tk){
    const months = new Set();
    const teamsToCheck = tk === 'all' ? TEAM_ORDER : [tk];
    teamsToCheck.forEach(t=>{
      Object.keys(scheduleData[t]||{}).forEach(dstr=>{ months.add(dstr.slice(0,7)); });
    });
    months.add(viewYear + '-' + String(viewMonth).padStart(2,'0'));
    return Array.from(months).sort();
  }

  function toArgb(hex){ return hex ? ('FF' + hex.replace('#','').toUpperCase()) : null; }

  // 값(am1~pm2/night/weekend) → 해당 상태 정의(HALF_STATUS/NIGHT_STATUS/WEEKEND_STATUS) 찾기 (색상 입히기용)
  function statusOf(val){
    if(!val) return null;
    if(HALF_MAP[val]) return HALF_MAP[val];
    if(NIGHT_MAP[val]) return NIGHT_MAP[val];
    if(WEEKEND_MAP[val]) return WEEKEND_MAP[val];
    for(const s of HALF_STATUS){ if(s.hasDetail && val.indexOf(s.key + ':') === 0) return s; }
    return null;
  }
  function colorCell(cell, val){
    const st = statusOf(val);
    if(st && st.color){
      cell.font = {color:{argb: toArgb(st.color)}, bold:true};
      if(st.bg) cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb: toArgb(st.bg)}};
    }
  }

  // 팀·이름 기준 한 달 통계 집계 (오전/오후 상태 + 야간 + 주말/휴일구분 모두 포함)
  function computePersonStats(teamKey, name, y, mo){
    const nDaysM = daysInMonth(y, mo);
    const stats = {};
    statDefs.forEach(s=> stats['s_'+s.key]=0);
    nightDefs.forEach(s=> stats['n_'+s.key]=0);
    weekendDefs.forEach(s=> stats['w_'+s.key]=0);
    for(let d=1; d<=nDaysM; d++){
      const dstr = fmtDate(y, mo, d);
      const e = getEntry(teamKey, dstr, name);
      const foundToday = new Set();
      SLOT_KEYS.forEach(k=>{ const st = matchStatus(e[k]); if(st) foundToday.add(st.key); });
      foundToday.forEach(k=>{ if(stats['s_'+k]!==undefined) stats['s_'+k]++; });
      if(e.night && stats['n_'+e.night]!==undefined) stats['n_'+e.night]++;
      if(e.weekend && stats['w_'+e.weekend]!==undefined) stats['w_'+e.weekend]++;
    }
    return stats;
  }
  function summarize(stats){
    return {
      workDays: stats['s_ON']||0,
      leaveDays: (stats['s_휴가']||0) + 0.5*(stats['s_오전휴가']||0) + 0.5*(stats['s_오후휴가']||0),
      duty: stats['w_당직']||0,
      phone: stats['w_전화']||0,
      extra: stats['w_추가편성']||0,
      etc: stats['w_기타']||0,
      nightTotal: (stats['n_석간']||0) + (stats['n_철야']||0) + (stats['n_잔업']||0),
      edu: stats['s_교육']||0,
      meet: stats['s_회의']||0,
    };
  }
  function styleHeaderRow(row){
    row.eachCell(c=>{ c.font = {bold:true, color:{argb:WHITE}}; c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:NAVY}}; c.alignment = {horizontal:'center', vertical:'middle'}; });
  }
  function borderAll(ws){
    ws.eachRow(row=> row.eachCell(c=>{
      c.border = {top:{style:'thin',color:{argb:LINE}}, bottom:{style:'thin',color:{argb:LINE}}, left:{style:'thin',color:{argb:LINE}}, right:{style:'thin',color:{argb:LINE}}};
    }));
  }

  const ym = viewYear + '-' + String(viewMonth).padStart(2,'0');
  const ymLabel = viewYear + '년 ' + viewMonth + '월';

  // ================= 개인별 요약 (전체 팀, 이번 달) =================
  const summaryWs = wb.addWorksheet('개인별 요약');
  const summaryRows = [];
  TEAM_ORDER.forEach(tk=>{
    TEAMS[tk].members.forEach(m=>{
      const s = summarize(computePersonStats(tk, m.name, viewYear, viewMonth));
      summaryRows.push([TEAMS[tk].label, m.name, m.role, s.workDays, s.leaveDays, s.duty, s.phone, s.nightTotal, s.edu, s.meet]);
    });
  });
  summaryWs.addTable({
    name: 'PersonSummary', ref: 'A1', headerRow: true, totalsRow: false,
    style: {theme:'TableStyleMedium9', showRowStripes:true},
    columns: [
      {name:'팀', filterButton:true}, {name:'이름', filterButton:true}, {name:'직급', filterButton:true},
      {name:'근무일', filterButton:false}, {name:'휴가일수', filterButton:false}, {name:'당직', filterButton:false},
      {name:'전화대기', filterButton:false}, {name:'야간계', filterButton:false}, {name:'교육', filterButton:false}, {name:'회의', filterButton:false},
    ],
    rows: summaryRows
  });
  [12,10,8,9,10,8,10,9,8,8].forEach((w,i)=> summaryWs.getColumn(i+1).width = w);
  styleHeaderRow(summaryWs.getRow(1));
  summaryWs.views = [{state:'frozen', ySplit:1}];
  summaryWs.getCell('A' + (summaryRows.length+3)).value = ymLabel + ' 기준';
  summaryWs.getCell('A' + (summaryRows.length+3)).font = {italic:true, color:{argb:'FF5A6B8C'}, size:10};

  // ================= 팀별 비교 (이번 달) =================
  const teamWs = wb.addWorksheet('팀별 비교');
  const teamRows = [];
  const grandTotal = {workDays:0, leaveDays:0, duty:0, phone:0, extra:0, etc:0, nightTotal:0, edu:0, meet:0};
  let grandCount = 0;
  TEAM_ORDER.forEach(tk=>{
    const totals = {workDays:0, leaveDays:0, duty:0, phone:0, extra:0, etc:0, nightTotal:0, edu:0, meet:0};
    TEAMS[tk].members.forEach(m=>{
      const s = summarize(computePersonStats(tk, m.name, viewYear, viewMonth));
      Object.keys(totals).forEach(k=> totals[k]+=s[k]);
    });
    Object.keys(grandTotal).forEach(k=> grandTotal[k]+=totals[k]);
    grandCount += TEAMS[tk].members.length;
    teamRows.push([TEAMS[tk].label, TEAMS[tk].members.length, totals.workDays, totals.leaveDays, totals.duty, totals.phone, totals.extra, totals.etc, totals.nightTotal, totals.edu, totals.meet]);
  });
  teamRows.push(['전체 합계', grandCount, grandTotal.workDays, grandTotal.leaveDays, grandTotal.duty, grandTotal.phone, grandTotal.extra, grandTotal.etc, grandTotal.nightTotal, grandTotal.edu, grandTotal.meet]);
  teamWs.addTable({
    name: 'TeamCompare', ref: 'A1', headerRow: true, totalsRow: false,
    style: {theme:'TableStyleMedium9', showRowStripes:true},
    columns: [
      {name:'팀', filterButton:false}, {name:'인원수', filterButton:false}, {name:'총근무일', filterButton:false},
      {name:'총휴가일수', filterButton:false}, {name:'총당직', filterButton:false}, {name:'총전화대기', filterButton:false},
      {name:'총추가편성', filterButton:false}, {name:'총기타', filterButton:false}, {name:'총야간계', filterButton:false},
      {name:'총교육', filterButton:false}, {name:'총회의', filterButton:false},
    ],
    rows: teamRows
  });
  [13,9,10,11,9,11,11,9,10,9,9].forEach((w,i)=> teamWs.getColumn(i+1).width = w);
  styleHeaderRow(teamWs.getRow(1));
  const teamTotalRowIdx = 1 + teamRows.length;
  teamWs.getRow(teamTotalRowIdx).eachCell(c=>{ c.font = {bold:true}; c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:LIGHTBLUE}}; });
  teamWs.views = [{state:'frozen', ySplit:1}];

  // ================= 당직·야간 형평성 (팀별로 당직 많은 순 정렬 + 색상 스케일) =================
  const equityWs = wb.addWorksheet('형평성');
  const equityRows = [];
  TEAM_ORDER.forEach(tk=>{
    const rows = TEAMS[tk].members.map(m=>{
      const s = summarize(computePersonStats(tk, m.name, viewYear, viewMonth));
      return [TEAMS[tk].label, m.name, m.role, s.duty, s.nightTotal];
    });
    rows.sort((a,b)=> b[3]-a[3] || b[4]-a[4]);
    rows.forEach(r=> equityRows.push(r));
  });
  equityWs.addTable({
    name: 'Equity', ref: 'A1', headerRow: true, totalsRow: false,
    style: {theme:'TableStyleMedium9', showRowStripes:true},
    columns: [
      {name:'팀', filterButton:true}, {name:'이름', filterButton:true}, {name:'직급', filterButton:true},
      {name:'당직', filterButton:false}, {name:'야간계', filterButton:false},
    ],
    rows: equityRows
  });
  [12,10,8,8,9].forEach((w,i)=> equityWs.getColumn(i+1).width = w);
  styleHeaderRow(equityWs.getRow(1));
  equityWs.views = [{state:'frozen', ySplit:1}];
  if(equityRows.length > 0){
    const lastRow = equityRows.length + 1;
    // 당직(D열), 야간계(E열) — 많을수록 진한 빨강, 적을수록 연한 초록 (부담 쏠림 한눈에 확인)
    equityWs.addConditionalFormatting({
      ref: 'D2:D' + lastRow,
      rules: [{type:'colorScale', cfvo:[{type:'min'},{type:'percentile', value:50},{type:'max'}],
        color:[{argb:'FFD1FAE5'},{argb:'FFFEF9C3'},{argb:'FFFEE2E2'}]}]
    });
    equityWs.addConditionalFormatting({
      ref: 'E2:E' + lastRow,
      rules: [{type:'colorScale', cfvo:[{type:'min'},{type:'percentile', value:50},{type:'max'}],
        color:[{argb:'FFD1FAE5'},{argb:'FFFEF9C3'},{argb:'FFFEE2E2'}]}]
    });
  }
  equityWs.getCell('A' + (equityRows.length+3)).value = '색이 진할수록(빨강) 부담이 많고, 연할수록(초록) 적음 · ' + ymLabel + ' 기준';
  equityWs.getCell('A' + (equityRows.length+3)).font = {italic:true, color:{argb:'FF5A6B8C'}, size:10};

  // ---- 통계 시트 (월별, 현재 팀) ----
  const statsWs = wb.addWorksheet('통계');
  const statsHeaders = ['월','이름','직급'].concat(statDefs.map(s=>s.label)).concat(nightDefs.map(s=>s.label)).concat(weekendDefs.map(s=>s.label));
  const statsRows = [];
  getMonthsWithData(currentTeam).forEach(monthYm=>{
    const parts = monthYm.split('-').map(Number);
    const y = parts[0], mo = parts[1];
    const monthTotals = {};
    statDefs.forEach(s=>monthTotals['s_'+s.key]=0);
    nightDefs.forEach(s=>monthTotals['n_'+s.key]=0);
    weekendDefs.forEach(s=>monthTotals['w_'+s.key]=0);

    team.members.forEach(m=>{
      const stats = computePersonStats(memberTeam(m), m.name, y, mo);
      Object.keys(stats).forEach(k=> monthTotals[k] = (monthTotals[k]||0) + stats[k]);
      statsRows.push([monthYm, m.name, m.role]
        .concat(statDefs.map(s=>stats['s_'+s.key]||0))
        .concat(nightDefs.map(s=>stats['n_'+s.key]||0))
        .concat(weekendDefs.map(s=>stats['w_'+s.key]||0)));
    });
    statsRows.push([monthYm, '월 합계', '']
      .concat(statDefs.map(s=>monthTotals['s_'+s.key]||0))
      .concat(nightDefs.map(s=>monthTotals['n_'+s.key]||0))
      .concat(weekendDefs.map(s=>monthTotals['w_'+s.key]||0)));
  });
  statsWs.addTable({
    name: 'Stats', ref: 'A1', headerRow: true, totalsRow: false,
    style: {theme:'TableStyleMedium9', showRowStripes:true},
    columns: statsHeaders.map((h,i)=>({name:h, filterButton: i<3})),
    rows: statsRows
  });
  statsHeaders.forEach((h,i)=>{ statsWs.getColumn(i+1).width = i<3 ? 10 : 9; });
  styleHeaderRow(statsWs.getRow(1));
  statsWs.views = [{state:'frozen', ySplit:1}];
  statsRows.forEach((r,i)=>{
    if(r[1] === '월 합계'){
      const row = statsWs.getRow(i+2);
      row.eachCell(c=>{ c.font = {bold:true}; c.fill = {type:'pattern', pattern:'solid', fgColor:{argb:LIGHTBLUE}}; });
    }
  });

  // ---- 상세 시트 (일자별, 현재 팀 · 이번 달) — 상태별 색상 적용 ----
  const detailWs = wb.addWorksheet('상세');
  const detailRows = [];
  for(let d=1; d<=nDays; d++){
    const dstr = fmtDate(viewYear, viewMonth, d);
    const wk = weekdayKr(viewYear, viewMonth, d);
    team.members.forEach(m=>{
      const e = getEntry(memberTeam(m), dstr, m.name);
      detailRows.push([dstr, wk, m.name, m.role, e.am1||'', e.am2||'', e.pm1||'', e.pm2||'', e.night||'', e.weekend||'']);
    });
  }
  detailWs.addTable({
    name: 'Detail', ref: 'A1', headerRow: true, totalsRow: false,
    style: {theme:'TableStyleMedium9', showRowStripes:true},
    columns: [
      {name:'날짜', filterButton:true}, {name:'요일', filterButton:true}, {name:'이름', filterButton:true}, {name:'직급', filterButton:true},
      {name:'오전1', filterButton:false}, {name:'오전2', filterButton:false}, {name:'오후1', filterButton:false}, {name:'오후2', filterButton:false},
      {name:'야간', filterButton:false}, {name:'주말/휴일 구분', filterButton:false},
    ],
    rows: detailRows
  });
  [12,6,10,8,20,20,20,20,14,14].forEach((w,i)=> detailWs.getColumn(i+1).width = w);
  styleHeaderRow(detailWs.getRow(1));
  detailWs.views = [{state:'frozen', ySplit:1}];
  detailRows.forEach((r,i)=>{
    const row = detailWs.getRow(i+2);
    [5,6,7,8,9,10].forEach(colIdx=> colorCell(row.getCell(colIdx), r[colIdx-1]));
  });

  [summaryWs, teamWs, equityWs, statsWs, detailWs].forEach(borderAll);

  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], {type:'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = team.label + '_근무일정_' + viewYear + String(viewMonth).padStart(2,'0') + '.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Excel로 내보내기 완료 (개인별요약·팀별비교·형평성·통계·상세)');
}

// ============================================================
// 이벤트 바인딩
// ============================================================
document.getElementById('prevBtn').onclick = ()=>{
  if(viewMode==='month'){ viewMonth--; if(viewMonth===0){viewMonth=12; viewYear--;} }
  else { weekAnchor = addDaysStr(weekAnchor, -7); }
  render();
};
document.getElementById('nextBtn').onclick = ()=>{
  if(viewMode==='month'){ viewMonth++; if(viewMonth===13){viewMonth=1; viewYear++;} }
  else { weekAnchor = addDaysStr(weekAnchor, 7); }
  render();
};
document.getElementById('todayBtn').onclick = ()=>{
  const t = new Date(); viewYear=t.getFullYear(); viewMonth=t.getMonth()+1; weekAnchor = todayISO(); render();
};
document.getElementById('viewMonthBtn').onclick = ()=>{
  viewMode='month';
  document.getElementById('viewMonthBtn').classList.add('active');
  document.getElementById('viewWeekBtn').classList.remove('active');
  render();
};
document.getElementById('viewWeekBtn').onclick = ()=>{
  viewMode='week';
  document.getElementById('viewWeekBtn').classList.add('active');
  document.getElementById('viewMonthBtn').classList.remove('active');
  render();
};
document.getElementById('dutyViewBtn').onclick = ()=>{
  dutyOnlyView = !dutyOnlyView;
  document.getElementById('dutyViewBtn').classList.toggle('active', dutyOnlyView);
  render();
};
document.getElementById('testConnBtn').onclick = testConnection;
document.getElementById('exportXlsxBtn').onclick = exportExcel;
document.getElementById('refreshBtn').onclick = async ()=>{
  await loadStorage(); render(); showToast('최신 일정을 불러왔습니다');
};

// ============================================================
// 초기화
// ============================================================
(async function init(){
  renderTeamTabs();
  renderLegend();
  renderGuide();
  render();
  await loadStorage();
  const removedAlready = await checkSeedRemoved();
  if(!removedAlready){
    removeSeedSchedule();
    render();
    await saveStorage();
    await markSeedRemoved();
    showToast('엑셀에서 가져온 당직 로테이션 데이터를 모두 삭제했습니다');
  }
  const v3Already = await checkSeedV3Applied();
  if(!v3Already){
    applySeedScheduleV3();
    render();
    await saveStorage();
    await markSeedV3Applied();
    showToast('석/야간·석간·주말당직·전화당직 데이터를 반영했습니다');
  }
  if(normalizeWeekendKeys()){
    render();
    await saveStorage();
  }
  if(normalizeWeekendNight()){
    render();
    await saveStorage();
  }
  render();
  setInterval(async ()=>{
    if(document.getElementById('overlay').classList.contains('show')) return;
    await loadStorage();
    render();
  }, 20000);
})();
</script>
</body>
</html>
